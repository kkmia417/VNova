[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[project]
name = "vnova-safety"
version = "0.1.0"
description = "Exclusive VNova safety and ApprovedResponse minting boundary"
requires-python = ">=3.13,<3.14"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/vnova_safety"]

[tool.hatch.build.targets.sdist]
only-include = ["src"]
